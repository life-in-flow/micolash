# Micolash Cage — Infrastructure Services
#
# Each cage gets its own compose project (via COMPOSE_PROJECT_NAME).
#
# Usage:
#   COMPOSE_PROJECT_NAME=cage-<name> docker compose up -d
#   COMPOSE_PROJECT_NAME=cage-<name> docker compose down -v

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: sandbox
      POSTGRES_PASSWORD: sandbox
      POSTGRES_DB: flow
    ports:
      - "${SANDBOX_PG_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sandbox"]
      interval: 5s
      timeout: 3s
      retries: 5

  nats:
    image: nats:2-alpine
    command: ["--jetstream", "--store_dir", "/data"]
    ports:
      - "${SANDBOX_NATS_PORT:-4222}:4222"
      - "${SANDBOX_NATS_MONITOR_PORT:-8222}:8222"
    volumes:
      - natsdata:/data

  redis:
    image: redis:7-alpine
    ports:
      - "${SANDBOX_REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
  natsdata:
  redisdata:
